name: Scrape Proxies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: |
          python3 scraper.py -o proxies.txt --validate --max-validate 500 --discover --health --json --grouped

      - name: Count proxies
        run: |
          COUNT=$(wc -l < proxies.txt)
          echo "Proxies found: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "⚠️ Low proxy count: $COUNT"
          fi

      - name: Commit results
        run: |
          git config user.name "proxy-scraper[bot]"
          git config user.email "proxy-scraper[bot]@users.noreply.github.com"
          git add proxies.txt proxies.json source-health.json proxies-by-country.json proxies-by-protocol.json proxies-stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            COUNT=$(wc -l < proxies.txt)
            git commit -m "🔄 update proxies: $COUNT alive [${TIMESTAMP}]"
            git fetch origin main
            git push --force-with-lease origin main
          fi

      - name: Summary
        run: |
          echo "## Proxy Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total proxies:** $(wc -l < proxies.txt)" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f proxies-stats.json ]; then
            echo "### Stats" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          d=json.load(open('proxies-stats.json'))
          print(f'- **Avg response time:** {d[\"avg_response_time_ms\"]}ms')
          print(f'- **Countries:** {len(d[\"by_country\"])}')
          print(f'- **Protocols:** {d[\"by_protocol\"]}')
          print(f'- **Anonymity:** {d[\"by_anonymity\"]}')
          " >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f source-health.json ]; then
            echo "### Source Health" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          d=json.load(open('source-health.json'))
          print(f'- **Sources:** {d[\"total_sources\"]} total, {d[\"alive_sources\"]} alive, {d[\"dead_sources\"]} dead')
          print(f'- **Raw proxies:** {d[\"total_proxies\"]}')
          alive = [(k,v) for k,v in d['sources'].items() if v.get('alive')]
          print()
          print('**Top 5 sources:**')
          for k,v in alive[:5]:
              print(f'  - {k}: {v[\"proxies\"]} proxies')
          " >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sample (first 20)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -20 proxies.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
