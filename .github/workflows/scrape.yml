name: Proxy Scraper CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'api/*.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Static syntax check
        run: python3 -m py_compile *.py api/*.py

      - name: Smoke test committed snapshots
        run: |
          test -s proxies.txt
          test -s proxies.json
          python3 -c 'import json; stats=json.load(open("proxies-stats.json")); proxies=json.load(open("proxies.json")); assert len(proxies) >= 100, "snapshot too small: {}".format(len(proxies)); assert stats.get("total", 0) >= 100, stats; print("snapshot ok: {} proxies".format(len(proxies)))'
