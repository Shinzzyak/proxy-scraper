name: Scrape Proxies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'freshen_pool.py'
      - 'export_formats.py'
      - 'tg_scraper.py'
      - 'geo_repair.py'
      - 'proxy_pool.py'
      - 'cli.py'
      - 'requirements.txt'
      - 'data/tg_channels.json'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # CI is a deterministic snapshot refresh, not the heavy VPS maintenance job.
      PROXY_VALIDATION_WALL_TIMEOUT: '90'
      PROXY_SOURCE_MAX_BYTES: '600000'
      PROXY_MAX_PROXIES_PER_SOURCE: '3000'
      PROXY_DB: data/proxies.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Static syntax check
        run: python3 -m py_compile *.py api/*.py

      - name: Refresh lightweight GitHub snapshot
        run: |
          python3 scraper.py \
            --validate \
            --pool \
            --json \
            --grouped \
            --health \
            --max-validate 300 \
            -o proxies.txt

      - name: Count proxies
        run: |
          COUNT=$(wc -l < proxies.txt)
          echo "Proxies found: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "⚠️ Low proxy count: $COUNT"
          fi

      - name: Commit results
        run: |
          git config user.name "proxy-scraper[bot]"
          git config user.email "proxy-scraper[bot]@users.noreply.github.com"
          git add proxies.txt proxies.json source-health.json proxies-by-country.json proxies-by-protocol.json proxies-stats.json data/tg_channels.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            COUNT=$(wc -l < proxies.txt)
            git commit -m "🔄 update proxies: $COUNT alive [${TIMESTAMP}]"
            git fetch origin main
            git push --force-with-lease origin main
          fi

      - name: Summary
        run: |
          echo "## Proxy Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total proxies:** $(wc -l < proxies.txt)" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f proxies-stats.json ]; then
            echo "### Stats" >> $GITHUB_STEP_SUMMARY
            python3 - <<'PY' >> $GITHUB_STEP_SUMMARY
import json
with open('proxies-stats.json') as f:
    d=json.load(f)
print(f'- **Avg response time:** {d.get("avg_response_time_ms", 0)}ms')
print(f'- **Avg score:** {d.get("avg_score", 0)}')
print(f'- **Countries:** {len(d.get("by_country", {}))}')
print(f'- **Protocols:** {d.get("by_protocol", {})}')
print(f'- **Anonymity:** {d.get("by_anonymity", {})}')
PY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f source-health.json ]; then
            echo "### Source Health" >> $GITHUB_STEP_SUMMARY
            python3 - <<'PY' >> $GITHUB_STEP_SUMMARY
import json
with open('source-health.json') as f:
    d=json.load(f)
print(f'- **Sources:** {d["total_sources"]} total, {d["alive_sources"]} alive, {d["dead_sources"]} dead')
print(f'- **Raw proxies:** {d["total_proxies"]}')
alive = [(k,v) for k,v in d['sources'].items() if v.get('alive')]
print()
print('**Top 5 sources:**')
for k,v in alive[:5]:
    print(f'  - {k}: {v["proxies"]} proxies')
PY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sample (first 20)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -20 proxies.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
